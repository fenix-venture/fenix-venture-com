<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Robots -->
    <meta name="robots" content="index, follow">
    <!-- Default Meta -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/images/favicon.ico">
    <title>{{ page.title }} | Fenix Venture</title>
    <meta name="title" content="{{ page.title }} | Fenix Venture">
    <meta name="description" content="{{ page.excerpt | default: page.description | strip_html | truncatewords: 30 }}">

    <meta property="og:type" content="article">
    <meta property="og:url" content="https://fenixventure.com{{ page.url }}">
    <meta property="og:title" content="{{ page.title }} | Fenix Venture">
    <meta property="og:description" content="{{ page.excerpt | default: page.description | strip_html | truncatewords: 30 }}">
    <meta property="og:image" content="https://fenixventure.com/images/fv-logo.png">
    <meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">
    <meta property="article:author" content="{{ page.author | default: 'Fenix Venture' }}">
    {% if page.categories %}<meta property="article:section" content="{{ page.categories | first }}">{% endif %}
    <link rel="canonical" href="https://fenixventure.com{{ page.url }}">
    <link rel="sitemap" type="application/xml" href="/sitemap.xml">

    <!-- Twitter/X Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ page.title }} | Fenix Venture">
    <meta name="twitter:description" content="{{ page.excerpt | default: page.description | strip_html | truncatewords: 30 }}">
    <meta name="twitter:image" content="https://fenixventure.com/images/fv-logo.png">

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BlogPosting",
      "headline": "{{ page.title | escape }}",
      "url": "https://fenixventure.com{{ page.url }}",
      "datePublished": "{{ page.date | date_to_xmlschema }}",
      "dateModified": "{{ page.last_modified_at | default: page.date | date_to_xmlschema }}",
      "description": "{{ page.excerpt | default: page.description | strip_html | truncatewords: 30 | escape }}",
      "author": {
        "@type": "Person",
        "name": "{{ page.author | default: 'Justin Henriksen' }}",
        "url": "https://fenixventure.com/about"
      },
      "publisher": {
        "@type": "Organization",
        "@id": "https://fenixventure.com/#organization",
        "name": "Fenix Venture",
        "logo": {
          "@type": "ImageObject",
          "url": "https://fenixventure.com/images/fv-logo.png"
        }
      },
      "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": "https://fenixventure.com{{ page.url }}"
      }{% if page.featured_image %},
      "image": "{{ page.featured_image }}"{% endif %}
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/site.css">

    <style>
        .post-hero {
            background: #0e0f11;
            padding: 5rem 0;
            position: relative;
            overflow: hidden;
        }
        .post-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.035) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
        }
        .post-hero::after {
            content: '';
            position: absolute;
            top: -200px; right: -150px;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(222,58,58,0.12) 0%, transparent 65%);
            pointer-events: none;
        }
        .post-hero-inner { position: relative; z-index: 2; }
        .post-hero-eyebrow {
            display: inline-flex; align-items: center; gap: 0.65rem;
            font-family: "Plus Jakarta Sans", sans-serif;
            font-size: 0.68rem; font-weight: 700; letter-spacing: 0.18em;
            text-transform: uppercase; color: #f07070; margin-bottom: 1.5rem;
        }
        .post-hero-eyebrow::before {
            content: ''; display: block; width: 22px; height: 1px; background: currentColor;
        }
        .post-hero h1 {
            font-family: "Plus Jakarta Sans", sans-serif !important;
            font-size: 2.75rem !important; font-weight: 800 !important;
            letter-spacing: -0.03em !important; line-height: 1.12 !important;
            color: #ffffff !important; margin-bottom: 1rem; max-width: 760px;
        }
        .post-hero-meta {
            font-size: 0.85rem; color: rgba(255,255,255,0.45);
            font-family: "Plus Jakarta Sans", sans-serif;
        }
        .post-hero-meta span { margin-right: 1.25rem; }
        .post-content { max-width: 680px; }
        .post-content p { font-size: 1.05rem; line-height: 1.8; color: #3a3d45; margin-bottom: 1.5rem; }
        .post-content h2 { font-family: "Plus Jakarta Sans", sans-serif; font-size: 1.6rem; font-weight: 700; margin: 2.5rem 0 1rem; color: #0e0f11; }
        .post-content h3 { font-family: "Plus Jakarta Sans", sans-serif; font-size: 1.25rem; font-weight: 700; margin: 2rem 0 0.75rem; color: #0e0f11; }
        .post-content ul, .post-content ol { padding-left: 1.5rem; margin-bottom: 1.5rem; }
        .post-content li { font-size: 1.05rem; line-height: 1.8; color: #3a3d45; margin-bottom: 0.5rem; }
        .post-content blockquote {
            border-left: 3px solid #DE3A3A; padding: 0.5rem 0 0.5rem 1.5rem;
            margin: 2rem 0; font-style: italic; color: #5c6370;
        }
        .post-content a { color: #DE3A3A; text-decoration: underline; }
        .post-content a:hover { color: #b02828; }
        .post-content code {
            background: #f5f5f5; padding: 2px 6px; border-radius: 3px;
            font-size: 0.9em; color: #0e0f11;
        }
        .post-back {
            font-family: "Plus Jakarta Sans", sans-serif;
            font-size: 0.8rem; font-weight: 700; letter-spacing: 0.06em;
            color: #DE3A3A; text-transform: uppercase; text-decoration: none;
        }
        .post-back:hover { color: #b02828; }
        @media (max-width: 768px) {
            .post-hero { padding: 3.5rem 0; }
            .post-hero h1 { font-size: 2rem !important; }
        }
    </style>
</head>

<body>

    <!-- Loaded via main.js -->
    <div id="header-placeholder"></div>

    <main>
        <!-- Post Hero -->
        <section class="post-hero">
            <div class="container">
                <div class="post-hero-inner">
                    <span class="post-hero-eyebrow">
                        {% if page.categories and page.categories.size > 0 %}{{ page.categories | first | upcase }}{% else %}BLOG{% endif %}
                    </span>
                    <h1>{{ page.title }}</h1>
                    <div class="post-hero-meta">
                        <span><time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %d, %Y" }}</time></span>
                        {% if page.author %}<span>{{ page.author }}</span>{% endif %}
                    </div>
                </div>
            </div>
        </section>

        <!-- Post Body -->
        <section style="padding: 4rem 0; background: #ffffff;">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-8">
                        <a href="/blog/" class="post-back d-inline-block mb-4">&larr; Back to blog</a>
                        <div class="post-content">
                            {{ content }}
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Loaded via main.js -->
    <div id="footer-placeholder"></div>

    <script src="/js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
